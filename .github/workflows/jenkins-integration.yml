name: Full CI/CD with Jenkins

on:
  push:
    branches: [ main, final-project ]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Target deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Test and Build
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Generate test report
      run: |
        go tool cover -html=coverage.out -o coverage.html
        echo "Test coverage report generated"

    - name: Build application
      run: |
        CGO_ENABLED=0 GOOS=linux go build -v -o mygram main.go

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage.html

  # Job 2: Docker Build and Push  
  docker-build-push:
    runs-on: ubuntu-latest
    needs: test-and-build
    
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image build summary
      run: |
        echo "🐳 Docker image built successfully!"
        echo "📦 Tags: ${{ steps.meta.outputs.tags }}"
        echo "🔐 Digest: ${{ steps.build.outputs.digest }}"

  # Job 3: Trigger Jenkins Pipeline
  trigger-jenkins:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/final-project'
    
    steps:
    - name: Extract image tag
      id: image-info
      run: |
        echo "image-tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "branch-name=${{ github.ref_name }}" >> $GITHUB_OUTPUT

    - name: Trigger Jenkins Build
      run: |
        echo "🚀 Triggering Jenkins Pipeline..."
        echo "📋 Build Parameters:"
        echo "  - Image Tag: ${{ steps.image-info.outputs.image-tag }}"
        echo "  - Branch: ${{ steps.image-info.outputs.branch-name }}"
        echo "  - Environment: ${{ github.event.inputs.deploy_environment || 'staging' }}"
        
        # Jenkins API call (will work when Jenkins is properly configured)
        JENKINS_URL="https://jenkins.egodev.tech"
        JENKINS_JOB="mygram-deployment"
        
        # Create the JSON payload
        PAYLOAD=$(cat <<EOF
        {
          "parameter": [
            {
              "name": "IMAGE_TAG",
              "value": "${{ steps.image-info.outputs.image-tag }}"
            },
            {
              "name": "GIT_BRANCH", 
              "value": "${{ steps.image-info.outputs.branch-name }}"
            },
            {
              "name": "ENVIRONMENT",
              "value": "${{ github.event.inputs.deploy_environment || 'staging' }}"
            },
            {
              "name": "GITHUB_RUN_ID",
              "value": "${{ github.run_id }}"
            }
          ]
        }
        EOF
        )
        
        echo "📡 Jenkins Payload:"
        echo "$PAYLOAD"
        
        # Actual Jenkins trigger (uncomment when Jenkins is configured)
        # curl -X POST \
        #   -H "Authorization: Bearer ${{ secrets.JENKINS_API_TOKEN }}" \
        #   -H "Content-Type: application/json" \
        #   -d "$PAYLOAD" \
        #   "$JENKINS_URL/job/$JENKINS_JOB/buildWithParameters"
        
        echo "✅ Jenkins trigger prepared (configure JENKINS_API_TOKEN secret to activate)"

    - name: Jenkins Integration Status
      run: |
        if [ -n "${{ secrets.JENKINS_API_TOKEN }}" ]; then
          echo "🟢 Jenkins integration: CONFIGURED"
          echo "Jenkins will handle deployment and testing"
        else
          echo "🟡 Jenkins integration: PENDING"
          echo "Add JENKINS_API_TOKEN secret to enable Jenkins integration"
          echo "Current status: Image ready for manual Jenkins deployment"
        fi

  # Job 4: Deployment Summary
  deployment-summary:
    runs-on: ubuntu-latest
    needs: [docker-build-push, trigger-jenkins]
    if: always()
    
    steps:
    - name: Deployment Status Report
      run: |
        echo "## 🚀 MyGram API Deployment Summary"
        echo ""
        echo "### Build Information"
        echo "- **Commit SHA**: ${{ github.sha }}"
        echo "- **Branch**: ${{ github.ref_name }}"  
        echo "- **Build ID**: ${{ github.run_id }}"
        echo "- **Image Tag**: sha-${{ github.sha }}"
        echo ""
        echo "### Pipeline Status"
        echo "- **Tests**: ${{ needs.test-and-build.result }}"
        echo "- **Docker Build**: ${{ needs.docker-build-push.result }}"
        echo "- **Jenkins Trigger**: ${{ needs.trigger-jenkins.result }}"
        echo ""
        echo "### Next Steps"
        if [ "${{ needs.docker-build-push.result }}" == "success" ]; then
          echo "✅ Docker image available at: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          echo "✅ Ready for Jenkins deployment pipeline"
          echo "✅ Ready for Coolify deployment"
        else
          echo "❌ Pipeline failed - check logs above"
        fi
        echo ""
        echo "### Portfolio Screenshots Available"
        echo "📸 GitHub Actions: This workflow"
        echo "📸 Jenkins: Configure jenkins.egodev.tech pipeline" 
        echo "📸 Swagger: Available at /swagger/index.html after deployment"
        echo "📸 Coolify: Deployment dashboard"

  # Job 5: Swagger Documentation Check
  swagger-validation:
    runs-on: ubuntu-latest
    needs: test-and-build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Install swag
      run: go install github.com/swaggo/swag/cmd/swag@latest
      
    - name: Generate Swagger docs
      run: |
        swag init
        echo "📚 Swagger documentation generated"
        ls -la docs/
        
    - name: Validate Swagger
      run: |
        if [ -f "docs/swagger.json" ]; then
          echo "✅ Swagger JSON generated successfully"
          echo "📖 Swagger UI will be available at: /swagger/index.html"
        else
          echo "⚠️ Swagger documentation not found"
        fi
        
    - name: Upload Swagger docs
      uses: actions/upload-artifact@v3
      with:
        name: swagger-docs
        path: docs/