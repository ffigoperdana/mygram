version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mygram-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: finalproject
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mygram-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: mygram-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_NAME=finalproject
      - DB_PORT=5432
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mygram-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/mygram", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for caching (optional - for future enhancements)
  redis:
    image: redis:7-alpine
    container_name: mygram-redis
    ports:
      - "6379:6379"
    networks:
      - mygram-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  mygram-network:
    driver: bridge